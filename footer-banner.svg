<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 110" width="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a0a0f"/>
      <stop offset="50%"  stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="sep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a0a0f"/>
      <stop offset="25%"  stop-color="#00F5FF"/>
      <stop offset="50%"  stop-color="#A78BFA"/>
      <stop offset="75%"  stop-color="#00F5FF"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
      @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0}    }
      @keyframes slide  { 0%{transform:translateX(-8px);opacity:0} 100%{transform:translateX(0);opacity:1} }
      .tagline { animation: pulse 3.5s ease-in-out infinite; }
      .cursor  { animation: blink 1.1s step-start infinite; }
      .dot-l   { animation: pulse 2.0s ease-in-out infinite; }
      .dot-c   { animation: pulse 2.6s ease-in-out infinite; }
      .dot-r   { animation: pulse 2.2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="110" fill="url(#bg)"/>

  <!-- Top separator line -->
  <rect x="0" y="0" width="900" height="1.5" fill="url(#sep)"/>

  <!-- Corner decorations -->
  <text x="18" y="36" fill="#00F5FF" font-family="JetBrains Mono,monospace" font-size="11" opacity="0.5" filter="url(#glow-soft)">┌─[SYS::EOF]</text>
  <text x="18" y="90" fill="#00F5FF" font-family="JetBrains Mono,monospace" font-size="11" opacity="0.5" filter="url(#glow-soft)">└─────────▶</text>
  <text x="756" y="36" fill="#A78BFA" font-family="JetBrains Mono,monospace" font-size="11" opacity="0.5" filter="url(#glow-soft)">[STATUS::ONLINE]─┐</text>
  <text x="790"  y="90" fill="#A78BFA" font-family="JetBrains Mono,monospace" font-size="11" opacity="0.5" filter="url(#glow-soft)">◀─────────┘</text>

  <!-- Accent dots -->
  <circle cx="180" cy="14" r="2" fill="#00F5FF" class="dot-l" filter="url(#glow-soft)"/>
  <circle cx="450" cy="14" r="2" fill="#A78BFA" class="dot-c" filter="url(#glow-soft)"/>
  <circle cx="720" cy="14" r="2" fill="#00F5FF" class="dot-r" filter="url(#glow-soft)"/>

  <!-- Main tagline -->
  <text x="450" y="57"
    text-anchor="middle"
    fill="#c9d1d9"
    font-family="JetBrains Mono,monospace"
    font-size="13"
    font-weight="bold"
    filter="url(#glow)"
    class="tagline">// profile: seguro, inteligente y listo para el siguiente desafío</text>
  <text x="596" y="57" fill="#00F5FF" font-family="JetBrains Mono,monospace" font-size="13" font-weight="bold" class="cursor" filter="url(#glow)">▌</text>

  <!-- Sub line -->
  <text x="450" y="76"
    text-anchor="middle"
    fill="#484f58"
    font-family="JetBrains Mono,monospace"
    font-size="9.5">Iván Lastra · Cybersecurity + AI Engineer · 2026</text>

  <!-- Bottom fade -->
  <rect width="900" height="25" y="85" fill="url(#fade)"/>
</svg>
